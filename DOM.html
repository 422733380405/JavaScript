<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="aman">Hello Students</h1>
    <button onclick="changeText()">click Me</button>
    <script>
        function changeText(){
            let element=document.getElementById("aman")
            element.innerText="Welcome to DOM Manipulation"
        }
    </script>
    
</body>
</html>
